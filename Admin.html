<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LiveKitaab Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #0e0e0f;
    --surface:   #161618;
    --surface2:  #1c1c1f;
    --border:    #2a2a2e;
    --green:     #4ade80;
    --green-dim: #1a3d28;
    --red:       #f87171;
    --red-dim:   #3d1a1a;
    --gold:      #fbbf24;
    --gold-dim:  #3d2e0a;
    --text:      #f0f0f0;
    --text-mid:  #9a9a9a;
    --text-dim:  #555;
    --radius:    10px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* ── LOGIN ────────────────────────────────────────────── */
  #loginScreen {
    position: fixed; inset: 0; background: var(--bg);
    display: flex; align-items: center; justify-content: center; z-index: 999;
  }
  .login-box {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 40px 36px; width: 100%; max-width: 360px;
    box-shadow: 0 24px 60px rgba(0,0,0,.6);
  }
  .login-brand {
    font-family: 'Playfair Display', serif; font-size: 1.4rem; font-weight: 900;
    color: var(--gold); text-align: center; margin-bottom: 4px;
  }
  .login-sub { font-size: .72rem; color: var(--text-dim); text-align: center; margin-bottom: 28px; letter-spacing: .12em; text-transform: uppercase; }
  .login-field {
    width: 100%; padding: 11px 14px; border-radius: var(--radius);
    background: var(--bg); border: 1.5px solid var(--border);
    color: var(--text); font-family: 'DM Mono', monospace; font-size: .88rem;
    outline: none; transition: border-color .2s; margin-bottom: 14px;
  }
  .login-field:focus { border-color: var(--gold); }
  .login-btn {
    width: 100%; padding: 11px; border-radius: var(--radius);
    background: var(--gold); color: #0e0e0f; font-family: 'DM Sans', sans-serif;
    font-size: .88rem; font-weight: 600; border: none; cursor: pointer; transition: opacity .18s;
  }
  .login-btn:hover { opacity: .85; }
  .login-err { font-size: .75rem; color: var(--red); text-align: center; margin-top: 10px; min-height: 18px; }

  /* ── APP SHELL ────────────────────────────────────────── */
  #adminApp { display: none; }

  .topbar {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 0 24px; height: 54px; display: flex; align-items: center;
    justify-content: space-between; position: sticky; top: 0; z-index: 50;
  }
  .topbar-brand { font-family: 'Playfair Display', serif; font-size: 1rem; font-weight: 700; color: var(--gold); }
  .topbar-right { display: flex; align-items: center; gap: 10px; }
  .live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.3} }
  .live-label { font-size: .72rem; color: var(--text-mid); }
  .top-btn {
    background: var(--surface2); border: 1px solid var(--border); color: var(--text-mid);
    padding: 6px 14px; border-radius: 20px; font-size: .72rem; cursor: pointer;
    font-family: 'DM Sans', sans-serif; transition: all .18s;
  }
  .top-btn:hover { border-color: var(--text-mid); color: var(--text); }
  .top-btn.danger:hover { border-color: var(--red); color: var(--red); }

  /* ── STATS ────────────────────────────────────────────── */
  .stats-bar {
    display: grid; grid-template-columns: repeat(4, 1fr);
    border-bottom: 1px solid var(--border);
  }
  @media (max-width: 600px) { .stats-bar { grid-template-columns: repeat(2, 1fr); } }
  .stat-cell {
    background: var(--surface); padding: 18px 22px;
    border-right: 1px solid var(--border);
  }
  .stat-cell:last-child { border-right: none; }
  .stat-label { font-size: .65rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: .1em; margin-bottom: 6px; }
  .stat-value { font-family: 'Playfair Display', serif; font-size: 1.5rem; font-weight: 700; }
  .stat-value.gold  { color: var(--gold); }
  .stat-value.green { color: var(--green); }

  /* ── SECTIONS ─────────────────────────────────────────── */
  .content { padding: 28px 24px; max-width: 960px; margin: 0 auto; }
  .section-header {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 16px;
  }
  .section-title {
    font-family: 'Playfair Display', serif; font-size: 1rem; font-weight: 700; color: var(--text);
  }
  .badge {
    font-size: .65rem; font-weight: 700; padding: 2px 8px; border-radius: 10px;
    background: var(--gold-dim); color: var(--gold); font-family: 'DM Sans', sans-serif;
  }
  .badge.green { background: var(--green-dim); color: var(--green); }
  .divider { height: 1px; background: var(--border); margin: 32px 0; }
  .empty-state {
    text-align: center; padding: 48px 20px; color: var(--text-dim);
    font-size: .85rem; font-style: italic;
  }
  .empty-state span { display: block; font-size: 2rem; margin-bottom: 10px; opacity: .5; }

  /* ── PENDING UTR CARDS ────────────────────────────────── */
  .utr-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 18px 20px; margin-bottom: 10px;
    display: flex; align-items: center; gap: 16px;
    animation: fadeUp .22s ease; transition: border-color .2s;
  }
  @keyframes fadeUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
  .utr-card:hover { border-color: #3a3a3e; }
  .utr-card.approved { border-color: var(--green-dim); background: rgba(74,222,128,.03); }
  .utr-card.rejected { opacity: .5; }

  .utr-body { flex: 1; display: flex; flex-direction: column; gap: 5px; }
  .utr-type {
    font-size: .65rem; text-transform: uppercase; letter-spacing: .1em;
    color: var(--text-dim); font-weight: 600;
  }
  .utr-type.sub { color: var(--gold); }
  .utr-title { font-size: .9rem; font-weight: 600; color: var(--text); }
  .utr-code {
    font-family: 'DM Mono', monospace; font-size: .8rem;
    color: var(--gold); background: var(--gold-dim);
    padding: 2px 8px; border-radius: 5px; width: fit-content;
  }
  .utr-meta { font-size: .7rem; color: var(--text-dim); font-family: 'DM Mono', monospace; }
  .utr-price { font-size: .8rem; color: var(--green); font-weight: 600; margin-top: 2px; }

  .utr-actions { display: flex; gap: 8px; flex-shrink: 0; }
  @media (max-width: 520px) { .utr-card { flex-direction: column; align-items: stretch; } }

  .act-btn {
    padding: 8px 18px; border-radius: 8px; font-family: 'DM Sans', sans-serif;
    font-size: .78rem; font-weight: 600; border: none; cursor: pointer;
    transition: all .18s; white-space: nowrap;
  }
  .act-approve { background: var(--green-dim); color: var(--green); }
  .act-approve:hover { background: var(--green); color: #0e0e0f; }
  .act-reject  { background: var(--red-dim);   color: var(--red); }
  .act-reject:hover  { background: var(--red);   color: #0e0e0f; }
  .act-done {
    padding: 8px 16px; border-radius: 8px; font-size: .75rem; font-weight: 600;
    color: var(--text-dim); background: transparent; border: 1px solid var(--border); cursor: default;
  }

  /* ── SUBSCRIBER CARDS ─────────────────────────────────── */
  .sub-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px 18px; margin-bottom: 8px;
    display: flex; align-items: center; gap: 14px;
  }
  .sub-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .sub-info { flex: 1; }
  .sub-status { font-size: .82rem; font-weight: 600; color: var(--text); }
  .sub-meta { font-size: .7rem; color: var(--text-dim); margin-top: 3px; font-family: 'DM Mono', monospace; }
  .sub-amount { font-size: .82rem; color: var(--gold); font-weight: 600; flex-shrink: 0; }

  /* ── READ COUNT CARDS ─────────────────────────────────── */
  .read-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px 18px; margin-bottom: 8px;
    display: flex; align-items: center; gap: 14px;
  }
  .read-medal { font-size: 1.2rem; flex-shrink: 0; width: 28px; text-align: center; }
  .read-info { flex: 1; }
  .read-title { font-size: .84rem; font-weight: 600; color: var(--text); }
  .read-breakdown { font-size: .7rem; color: var(--text-dim); margin-top: 3px; }
  .read-bar { height: 3px; background: var(--border); border-radius: 2px; margin-top: 7px; overflow: hidden; }
  .read-bar-fill { height: 100%; background: var(--green); border-radius: 2px; transition: width .5s; }
  .read-count { font-size: 1rem; font-weight: 700; color: var(--gold); flex-shrink: 0; font-family: 'Playfair Display', serif; }

  /* ── PURGE BAR ─────────────────────────────────────── */
  .purge-bar {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 10px 24px; display: flex; align-items: center; gap: 14px;
  }
  .purge-label { font-family:'DM Mono',monospace; font-size:.62rem; color:var(--text-dim); text-transform:uppercase; letter-spacing:.1em; }
  .purge-btn {
    background: var(--gold-dim); border: 1px solid var(--gold-line);
    color: var(--gold); padding: 6px 16px; border-radius: 20px;
    font-family:'DM Sans',sans-serif; font-size:.75rem; font-weight:600;
    cursor: pointer; transition: all .18s;
  }
  .purge-btn:hover { background: var(--gold); color: var(--bg); }
  .purge-btn:disabled { opacity: .5; cursor: not-allowed; }
  .purge-status { font-family:'DM Mono',monospace; font-size:.68rem; color:var(--text-mid); }

  /* ── TOAST ────────────────────────────────────────────── */
  #toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: var(--surface2); color: var(--text); border: 1px solid var(--border);
    padding: 10px 24px; border-radius: 30px; font-size: .8rem;
    box-shadow: 0 8px 32px rgba(0,0,0,.5); transition: transform .28s ease; z-index: 999;
    white-space: nowrap;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }
  #toast.ok   { border-color: var(--green); color: var(--green); }
  #toast.err  { border-color: var(--red);   color: var(--red); }
</style>
</head>
<body>

<!-- ── LOGIN ─────────────────────────────────────────────── -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-brand">LiveKitaab</div>
    <div class="login-sub">Admin Panel</div>
    <input class="login-field" id="loginInput" type="password"
           placeholder="Password" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">Enter →</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<!-- ── ADMIN APP ──────────────────────────────────────────── -->
<div id="adminApp">

  <div class="topbar">
    <div class="topbar-brand">⚙ LiveKitaab Admin</div>
    <div class="topbar-right">
      <div class="live-dot"></div>
      <span class="live-label">Live</span>
      <button class="top-btn" onclick="loadAll()">↻ Refresh</button>
      <button class="top-btn danger" onclick="doLogout()">Logout</button>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats-bar">
    <div class="stat-cell">
      <div class="stat-label">Pending</div>
      <div class="stat-value gold" id="statPending">–</div>
    </div>
    <div class="stat-cell">
      <div class="stat-label">Active Subscribers</div>
      <div class="stat-value green" id="statSubs">–</div>
    </div>
    <div class="stat-cell">
      <div class="stat-label">Sub Revenue</div>
      <div class="stat-value" id="statSubRev">–</div>
    </div>
    <div class="stat-cell">
      <div class="stat-label">Total Reads</div>
      <div class="stat-value" id="statReads">–</div>
    </div>
  </div>

  <div class="purge-bar">
  <span class="purge-label">CDN Cache</span>
  <button class="purge-btn" id="purgeBtn" onclick="purgeAll()">🔄 Purge jsDelivr Cache</button>
  <span class="purge-status" id="purgeStatus"></span>
</div>

<div class="content">

    <!-- Pending UTRs -->
    <div class="section-header">
      <div class="section-title">Pending Approvals</div>
      <span class="badge" id="pendingBadge">0</span>
    </div>
    <div id="pendingList"></div>

    <div class="divider"></div>

    <!-- Subscriptions -->
    <div class="section-header">
      <div class="section-title">Subscriptions</div>
      <span class="badge green" id="subsBadge">0</span>
    </div>
    <div id="subsList"></div>

    <div class="divider"></div>

    <!-- Read counts -->
    <div class="section-header">
      <div class="section-title">Books Read</div>
      <span class="badge green" id="readsBadge">0</span>
    </div>
    <div id="readList"></div>

  </div>
</div>

<div id="toast"></div>

<script>
const API       = 'https://library-y7vs.onrender.com';
const ADMIN_KEY = 'LiveKitaabAdminHaiAC@2014';

// ── LOGIN ──────────────────────────────────────────────────
function doLogin() {
  const val = document.getElementById('loginInput').value.trim();
  if (val === ADMIN_KEY) {
    sessionStorage.setItem('lk_admin', '1');
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('adminApp').style.display = 'block';
    boot();
  } else {
    document.getElementById('loginErr').textContent = 'Incorrect password.';
    document.getElementById('loginInput').select();
  }
}

function doLogout() {
  sessionStorage.removeItem('lk_admin');
  location.reload();
}

window.addEventListener('DOMContentLoaded', () => {
  if (sessionStorage.getItem('lk_admin')) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('adminApp').style.display = 'block';
    boot();
  }
});

function boot() {
  loadAll();
  setInterval(loadAll, 30000);
}

// ── LOAD ALL ───────────────────────────────────────────────
async function loadAll() {
  await Promise.all([loadPending(), loadSubs(), loadReads()]);
}

// ── PENDING UTRs ───────────────────────────────────────────
async function loadPending() {
  const el = document.getElementById('pendingList');
  try {
    const r = await fetch(`${API}/api/admin/pending`, {
      headers: { 'X-Admin-Key': ADMIN_KEY }
    });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const d = await r.json();
    const list = (d.purchases || []).filter(p => p.status === 'pending');

    document.getElementById('statPending').textContent  = list.length;
    document.getElementById('pendingBadge').textContent = list.length;

    if (!list.length) {
      el.innerHTML = '<div class="empty-state"><span>✅</span>All clear — no pending approvals</div>';
      return;
    }
    el.innerHTML = '';
    // Most recent first
    list.slice().reverse().forEach(p => el.appendChild(makePendingCard(p)));
  } catch (e) {
    el.innerHTML = `<div class="empty-state">Could not reach server — ${esc(e.message)}</div>`;
  }
}

function makePendingCard(p) {
  const card = document.createElement('div');
  card.className = 'utr-card';
  card.id = 'card-' + p.verification_code;

  const isSub = p.type === 'subscription' || p.book_id === '__subscription__';
  const ts    = p.timestamp ? new Date(p.timestamp).toLocaleString('en-IN') : '–';
  const title = isSub ? '⭐ Subscription (₹200/month)' : '📖 ' + esc(p.book_id || '–');
  const code  = p.verification_code || '–';

  card.innerHTML = `
    <div class="utr-body">
      <div class="utr-type ${isSub ? 'sub' : ''}">${isSub ? 'SUBSCRIPTION' : 'BOOK PURCHASE'}</div>
      <div class="utr-title">${title}</div>
      <div class="utr-code">${esc(p.transaction_id || '–')}</div>
      <div class="utr-meta">${ts} · Code: ${esc(code)}</div>
      <div class="utr-price">₹${p.price ?? '–'}</div>
    </div>
    <div class="utr-actions" id="actions-${esc(code)}">
      <button class="act-btn act-approve" onclick="approve('${esc(code)}')">✓ Approve</button>
      <button class="act-btn act-reject"  onclick="reject('${esc(code)}')">✕ Reject</button>
    </div>
  `;
  return card;
}

// ── APPROVE / REJECT ───────────────────────────────────────
async function approve(code) {
  setCardActions(code, '<span class="act-done">Processing…</span>');
  try {
    const r = await fetch(`${API}/api/verify-purchase`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ verification_code: code, admin_key: ADMIN_KEY })
    });
    const d = await r.json();
    if (d.success) {
      toast('✓ Approved!', 'ok');
      const card = document.getElementById('card-' + code);
      if (card) {
        card.classList.add('approved');
        setCardActions(code, '<span class="act-done">✓ Approved</span>');
      }
      setTimeout(loadAll, 1200);
    } else {
      toast('Error: ' + (d.error || 'Unknown'), 'err');
      resetCardActions(code);
    }
  } catch {
    toast('Network error', 'err');
    resetCardActions(code);
  }
}

async function reject(code) {
  if (!confirm('Reject and remove this submission?')) return;
  try {
    const r = await fetch(`${API}/api/reject-purchase`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ verification_code: code, admin_key: ADMIN_KEY })
    });
    const d = await r.json();
    if (d.success) {
      toast('Rejected', 'err');
      const card = document.getElementById('card-' + code);
      if (card) card.classList.add('rejected');
      setTimeout(loadAll, 1200);
    }
  } catch { toast('Network error', 'err'); }
}

function setCardActions(code, html) {
  const el = document.getElementById('actions-' + code);
  if (el) el.innerHTML = html;
}

function resetCardActions(code) {
  setCardActions(code, `
    <button class="act-btn act-approve" onclick="approve('${esc(code)}')">✓ Approve</button>
    <button class="act-btn act-reject"  onclick="reject('${esc(code)}')">✕ Reject</button>
  `);
}

// ── SUBSCRIPTIONS ──────────────────────────────────────────
async function loadSubs() {
  const el = document.getElementById('subsList');
  try {
    const r = await fetch(`${API}/api/admin/subscriptions`, {
      headers: { 'X-Admin-Key': ADMIN_KEY }
    });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const d = await r.json();
    const all = d.subscriptions || [];

    const now = new Date();
    const withExpiry = all.map(s => {
      // expiry is stored directly, or calculated from confirmed_at + days
      let expiry = s.expiry ? new Date(s.expiry) : null;
      if (!expiry && s.confirmed_at) {
        expiry = new Date(s.confirmed_at);
        expiry.setDate(expiry.getDate() + (s.days || 30));
      }
      const active   = expiry ? expiry > now : false;
      const daysLeft = expiry ? Math.max(0, Math.ceil((expiry - now) / 86400000)) : 0;
      return { ...s, expiry, active, daysLeft };
    });

    const activeCount = withExpiry.filter(s => s.active).length;
    document.getElementById('statSubs').textContent   = activeCount;
    document.getElementById('statSubRev').textContent = '₹' + (all.length * 200);
    document.getElementById('subsBadge').textContent  = activeCount + ' active';

    if (!withExpiry.length) {
      el.innerHTML = '<div class="empty-state"><span>📋</span>No subscribers yet</div>';
      return;
    }
    el.innerHTML = '';
    // Active first, then expired
    withExpiry
      .sort((a, b) => b.active - a.active)
      .forEach(s => el.appendChild(makeSubCard(s)));
  } catch (e) {
    el.innerHTML = `<div class="empty-state">Could not load subscriptions — ${esc(e.message)}</div>`;
  }
}

function makeSubCard(s) {
  const card = document.createElement('div');
  card.className = 'sub-card';

  const ts = s.confirmed_at
    ? new Date(s.confirmed_at).toLocaleString('en-IN', { day:'numeric', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' })
    : '–';

  const expiryStr = s.expiry
    ? new Date(s.expiry).toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' })
    : '–';

  card.innerHTML = `
    <div class="sub-dot" style="background:${s.active ? 'var(--green)' : 'var(--text-dim)'}"></div>
    <div class="sub-info">
      <div class="sub-status">${s.active ? '⭐ Active' : '⏰ Expired'} ${s.active ? '· ' + s.daysLeft + ' day' + (s.daysLeft !== 1 ? 's' : '') + ' left' : ''}</div>
      <div class="sub-meta">UTR: ${esc(s.transaction_id || '–')} · Activated: ${ts} · Expires: ${expiryStr}</div>
    </div>
    <div class="sub-amount">₹200</div>
  `;
  return card;
}

// ── READ COUNTS ────────────────────────────────────────────
async function loadReads() {
  const el = document.getElementById('readList');
  try {
    const r = await fetch(`${API}/api/admin/read-counts`, {
      headers: { 'X-Admin-Key': ADMIN_KEY }
    });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const d = await r.json();
    const list = d.books || [];

    const totalReads = list.reduce((s, b) => s + (b.total_reads || 0), 0);
    document.getElementById('statReads').textContent  = totalReads;
    document.getElementById('readsBadge').textContent = totalReads + ' total';

    if (!list.length) {
      el.innerHTML = '<div class="empty-state"><span>📖</span>No reads tracked yet</div>';
      return;
    }

    const maxReads = Math.max(...list.map(b => b.total_reads || 0), 1);
    el.innerHTML = '';
    const medals = ['🥇', '🥈', '🥉'];
    list.forEach((b, i) => {
      const card = document.createElement('div');
      card.className = 'read-card';
      const pct = Math.round(((b.total_reads || 0) / maxReads) * 100);
      card.innerHTML = `
        <div class="read-medal">${medals[i] || '📖'}</div>
        <div class="read-info">
          <div class="read-title">${esc(b.title || b.book_id)}</div>
          <div class="read-breakdown">Free: ${b.free_reads || 0} &nbsp;·&nbsp; Subscribers: ${b.sub_reads || 0}</div>
          <div class="read-bar"><div class="read-bar-fill" style="width:${pct}%"></div></div>
        </div>
        <div class="read-count">${b.total_reads || 0}</div>
      `;
      el.appendChild(card);
    });
  } catch (e) {
    el.innerHTML = `<div class="empty-state">Could not load read counts — ${esc(e.message)}</div>`;
  }
}

// ── HELPERS ────────────────────────────────────────────────
function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

let _toastTimer;
function toast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show' + (type ? ' ' + type : '');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => { t.className = ''; }, 3000);
}

async function purgeAll() {
  const btn    = document.getElementById('purgeBtn');
  const status = document.getElementById('purgeStatus');
  btn.disabled = true;
  btn.textContent = '⏳ Purging…';
  status.textContent = '';

  let ok = 0, fail = 0;

  // jsDelivr purge API — one request per URL
  // Rate limited, so we batch with small delays
  for (let i = 0; i < PURGE_URLS.length; i++) {
    const url = PURGE_URLS[i];
    // Convert CDN URL to purge API URL
    // https://cdn.jsdelivr.net/gh/USER/REPO@BRANCH/PATH
    // → https://purge.jsdelivr.net/gh/USER/REPO@BRANCH/PATH
    const purgeUrl = url.replace('cdn.jsdelivr.net', 'purge.jsdelivr.net');
    try {
      const r = await fetch(purgeUrl);
      if (r.ok) { ok++; } else { fail++; }
    } catch { fail++; }
    status.textContent = `${i+1}/${PURGE_URLS.length} purged…`;
    // Small delay to avoid rate limiting
    if (i < PURGE_URLS.length - 1) await new Promise(r => setTimeout(r, 80));
  }

  btn.disabled = false;
  btn.textContent = '🔄 Purge jsDelivr Cache';
  if (fail === 0) {
    status.textContent = `✅ All ${ok} files purged — changes live in ~30s`;
    toast('✅ CDN cache purged!', 'ok');
  } else {
    status.textContent = `⚠ ${ok} ok, ${fail} failed`;
    toast(`CDN purge: ${ok} ok, ${fail} failed`, 'err');
  }
}
